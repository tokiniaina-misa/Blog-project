version: '3.9'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: blogdb
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpass
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"

  web:
    build: .
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  tests:
    build: .
    command: >
      bash -c "
        echo 'Installing test dependencies...' &&
        pip install pytest-django pytest-cov &&
        echo 'Waiting for database...' &&
        while ! nc -z db 5432; do sleep 1; done &&
        echo 'Database is ready!' &&
        python manage.py migrate &&
        mkdir -p /code/test-results &&
        echo 'Running Unit Tests...' &&
        pytest tests/core_tests/test_units.py -v --junitxml=/code/test-results/unit-results.xml --ds=blogproject.settings &&
        echo 'Running Integration Tests...' &&
        pytest tests/core_tests/test_integration.py -v --junitxml=/code/test-results/integration-results.xml --ds=blogproject.settings &&
        echo 'Running Performance Tests...' &&
        pytest tests/core_tests/test_performance.py -v --junitxml=/code/test-results/performance-results.xml --ds=blogproject.settings &&
        echo 'Running Database Tests...' &&
        pytest tests/core_tests/test_database.py -v --junitxml=/code/test-results/db-results.xml --ds=blogproject.settings &&
        echo 'Generating Coverage Report...' &&
        pytest tests/core_tests/ --cov=./ --cov-report=xml:/code/test-results/coverage.xml --cov-report=html:/code/test-results/htmlcov --ds=blogproject.settings
      "
    volumes:
      - .:/code
    environment:
      - DATABASE_URL=postgresql://bloguser:blogpass@db:5432/blogdb
      - DJANGO_SETTINGS_MODULE=blogproject.settings
      - PYTHONPATH=/code
      - POSTGRES_HOST=db
      - POSTGRES_DB=blogdb
      - POSTGRES_USER=bloguser
      - POSTGRES_PASSWORD=blogpass
    depends_on:
      - db

volumes:
  test-results:
  
  postgres_data:
