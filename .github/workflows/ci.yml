name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: blogdb
          POSTGRES_USER: bloguser
          POSTGRES_PASSWORD: blogpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write .env file from ENV_FILE secret
        run: echo "$ENV_FILE" > .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: blogproject.settings
          DATABASE_URL: postgres://bloguser:blogpass@localhost:5432/blogdb
        run: |
          python manage.py migrate

      - name: Run tests and generate result
        env:
          DJANGO_SETTINGS_MODULE: blogproject.settings
          DATABASE_URL: postgres://bloguser:blogpass@localhost:5432/blogdb
        run: |
          mkdir -p test-results
          pytest tests/core_tests/ --cov=./ --cov-report=xml:test-results/coverage.xml --cov-report=html:test-results/htmlcov --junitxml=test-results/results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/*.xml
            test-results/htmlcov/
          retention-days: 7
