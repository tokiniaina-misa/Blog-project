name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: blogdb
          POSTGRES_USER: bloguser
          POSTGRES_PASSWORD: blogpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bloguser -d blogdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: blogproject.settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create .env file from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for DB
        run: |
          for i in {1..15}; do
            pg_isready -h localhost -U bloguser -d blogdb && break
            echo "Waiting for database to be ready..."
            sleep 2
          done

      - name: Migrate DB
        run: python manage.py migrate

      - name: Collectstatic
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: pytest tests/ --ds=blogproject.settings --junitxml=results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml

      - name: Build Docker image
        run: docker build -t blogproject:latest .

      - name: Docker smoke test
        run: |
          docker run -d --rm -p 8000:8000 --name blog_smoke_test blogproject:latest
          for i in {1..15}; do
            curl -f http://localhost:8000 && break
            echo "Waiting for application to start..."
            sleep 2
          done
          docker stop blog_smoke_test
