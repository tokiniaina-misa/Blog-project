name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: blogdb
          POSTGRES_USER: bloguser
          POSTGRES_PASSWORD: blogpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bloguser -d blogdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://bloguser:blogpassword@localhost:5432/blogdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for DB
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -U bloguser -d blogdb && break
            sleep 2
          done

      - name: Override DB host for CI
        run: echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV

      - name: Set environment variables
        run: |
          echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> $GITHUB_ENV

      - name: Run migrations
        run: python manage.py migrate

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run Unit and Integration Tests
        run: |
          echo "Running Unit Tests..."
          pytest tests/core_tests/test_units.py -v --junitxml=unit-results.xml
          
          echo "Running Integration Tests..."
          pytest tests/core_tests/test_integration.py -v --junitxml=integration-results.xml
        continue-on-error: false

      - name: Run Performance Tests
        run: |
          echo "Running Performance Tests..."
          pytest tests/core_tests/test_performance.py -v --junitxml=performance-results.xml
        continue-on-error: true

      - name: Run Database Integration Tests
        run: |
          echo "Running Database Integration Tests..."
          pytest tests/core_tests/test_database.py -v --junitxml=db-results.xml
        continue-on-error: false

      - name: Generate Coverage Report
        run: |
          pytest tests/core_tests/ --cov=./ --cov-report=xml --cov-report=html

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            unit-results.xml
            integration-results.xml
            performance-results.xml
            db-results.xml
            coverage.xml
            htmlcov/

      - name: Publish Coverage Report
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
