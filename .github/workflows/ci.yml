name: CI-CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # 1️⃣ Tests
  verifier-tester:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: python-version: '3.11'
      - name: Créer .env à partir du secret
        run: echo "${{ secrets.ENV_FILE }}" > .env
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: pytest tests/ --junitxml=results.xml

  # 2️⃣ Build & Push Docker
  build-docker:
    runs-on: ubuntu-latest
    needs: verifier-tester
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/blogproject:latest .
      - name: Docker login
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/blogproject:latest

  # 3️⃣ Terraform Infra
  infra-aws:
    runs-on: ubuntu-latest
    needs: build-docker
    outputs:
      ec2_ip: ${{ steps.get_ip.outputs.ec2_ip }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Load SSH Key
        run: echo "${{ secrets.EC2_SSH_KEY }}" > ci_key && chmod 600 ci_key
      - run: |
          terraform -chdir=infra init
          terraform -chdir=infra apply -auto-approve \
            -var="key_pair_name=ci-key" \
            -var="allowed_ssh_cidr=${{ secrets.MY_IP_CIDR }}"
      - id: get_ip
        run: |
          IP=$(terraform -chdir=infra output -raw public_ip)
          echo "EC2_IP=$IP" >> $GITHUB_ENV
          echo "ec2_ip=$IP" >> $GITHUB_OUTPUT
          echo "$IP" > ec2_ip.txt
      - name: Upload EC2 IP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ec2-public-ip
          path: ec2_ip.txt
      - run: echo "EC2 public IP = ${{ steps.get_ip.outputs.ec2_ip }}"

  # 4️⃣ Déploiement Docker via SSH
  deploy-ec2:
    runs-on: ubuntu-latest
    needs: infra-aws
    steps:
      - run: |
          ssh -o StrictHostKeyChecking=no -i ci_key ubuntu@${{ needs.infra-aws.outputs.ec2_ip }} "
          docker login -u '${{ secrets.DOCKERHUB_USERNAME }}' -p '${{ secrets.DOCKERHUB_PASSWORD }}'
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/blogproject:latest
          docker stop blog || true && docker rm blog || true
          docker run -d -p 80:8000 --name blog ${{ secrets.DOCKERHUB_USERNAME }}/blogproject:latest
          "

  # 5️⃣ Smoke test
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-ec2
    steps:
      - run: |
          for i in {1..10}; do
            curl -fs http://${{ needs.infra-aws.outputs.ec2_ip }} && exit 0
            sleep 5
          done
          echo "App did not respond in time" && exit 1
