name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: blogdb
          POSTGRES_USER: bloguser
          POSTGRES_PASSWORD: blogpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bloguser -d blogdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://bloguser:blogpassword@localhost:5432/blogdb

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for DB
        run: |
          for i in {1..10}; do
            pg_isready -h localhost -U bloguser -d blogdb && break
            sleep 2
          done

      - name: Override DB host for CI
        run: echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV

      - name: Set environment variables
        run: |
          echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> $GITHUB_ENV

      - name: Run migrations
        run: python manage.py migrate

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: |
          pytest tests/ --ds=blogproject.settings --junitxml=results.xml
        continue-on-error: false

      - name: Publish test results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: results.xml

      - name: Build Docker image
        run: docker build -t blogproject:latest .

      - name: Smoke test Docker image
        run: |
          docker run -d --rm -p 8000:8000 --name blog_smoke_test blogproject:latest
          for i in {1..10}; do
            curl -f http://localhost:8000 && break
            echo "Waiting for application to start..."
            sleep 2
          done
          docker stop blog_smoke_test
