name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: blogdb
          POSTGRES_USER: bloguser
          POSTGRES_PASSWORD: blogpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Run Migrations
        env:
          DJANGO_SETTINGS_MODULE: blogproject.settings
          DATABASE_URL: postgres://bloguser:blogpass@localhost:5432/blogdb
        run: |
          python manage.py migrate

      - name: Run Tests
        env:
          DJANGO_SETTINGS_MODULE: blogproject.settings
          DATABASE_URL: postgres://bloguser:blogpass@localhost:5432/blogdb
        run: |
          mkdir -p test-results
          
          echo "Running Unit Tests..."
          pytest tests/core_tests/test_units.py -v --junitxml=test-results/unit.xml
          
          echo "Running Integration Tests..."
          pytest tests/core_tests/test_integration.py -v --junitxml=test-results/integration.xml
          
          echo "Running All Tests with Coverage..."
          pytest tests/core_tests/ --cov=./ --cov-report=xml:test-results/coverage.xml --cov-report=html:test-results/htmlcov

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/*.xml
            test-results/htmlcov/
          retention-days: 7
